<!DOCTYPE html>
<html lang="en-US">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Chladni</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #1e1e1e; }
    canvas { display: block; }
  </style>
</head>
<body>
<canvas id="c"></canvas>
<script>
  // ── params (identical to original) ──────────────────────────────────────
  let P = { m:8, n:4, a:1, b:1, v:0.02, num:10000 };

  const randInt    = (a, b) => Math.floor(Math.random() * (b - a + 1)) + a;
  const randChoice = arr    => arr[Math.floor(Math.random() * arr.length)];
  const aVals = [-2, -1, 1, 2];

  function randomise() {
    P.m = randInt(1, 16);
    P.n = randInt(1, 16);
    P.a = randChoice(aVals);
    P.b = randChoice(aVals);
  }

  // postMessage API (same as original)
  window.addEventListener('message', e => { if (e.data === 'randomise') randomise(); });

  // ── canvas setup ────────────────────────────────────────────────────────
  const canvas = document.getElementById('c');
  const ctx    = canvas.getContext('2d');
  const dpr    = Math.min(devicePixelRatio, 2);

  function resize() {
    canvas.width  = innerWidth  * dpr;
    canvas.height = innerHeight * dpr;
    canvas.style.width  = innerWidth  + 'px';
    canvas.style.height = innerHeight + 'px';
    ctx.scale(dpr, dpr);
  }
  resize();
  window.addEventListener('resize', resize);

  // ── Chladni equation ────────────────────────────────────────────────────
  const PI  = Math.PI;
  const MIN = 0.002;

  function chladni(x, y) {
    return P.a * Math.sin(PI*P.n*x) * Math.sin(PI*P.m*y)
         + P.b * Math.sin(PI*P.m*x) * Math.sin(PI*P.n*y);
  }

  // ── particles (Float32 arrays — compact & cache-friendly) ───────────────
  const NUM = P.num;
  const px  = new Float32Array(NUM);
  const py  = new Float32Array(NUM);

  for (let i = 0; i < NUM; i++) {
    px[i] = 0.05 + Math.random() * 0.9;
    py[i] = 0.05 + Math.random() * 0.9;
  }

  function rnd() { return Math.random() * 2 - 1; } // [-1, 1]

  // ── draw loop ───────────────────────────────────────────────────────────
  let W = innerWidth, H = innerHeight;
  let lastTime = 0;
  const TARGET_FPS = 30;          // cap at 30 fps — half the work, invisible difference
  const FRAME_MS   = 1000 / TARGET_FPS;

  function draw(ts) {
    requestAnimationFrame(draw);

    // frame-rate cap
    if (ts - lastTime < FRAME_MS) return;
    lastTime = ts;

    W = innerWidth; H = innerHeight;

    ctx.fillStyle = 'rgb(30,30,30)';
    ctx.fillRect(0, 0, W, H);

    // batch all points into a single ImageData write for speed
    ctx.fillStyle = 'rgba(255,255,255,0.85)';
    ctx.beginPath();

    const n = Math.min(P.num, NUM);
    for (let i = 0; i < n; i++) {
      let x = px[i], y = py[i];

      const eq  = chladni(x, y);
      let   amp = P.v * Math.abs(eq);
      if (amp < MIN) amp = MIN;

      x += rnd() * amp;
      y += rnd() * amp;

      if (x < 0) x = -x;
      if (x > 1) x = 2 - x;
      if (y < 0) y = -y;
      if (y > 1) y = 2 - y;
      if (x < 0) x = 0; if (x > 1) x = 1;
      if (y < 0) y = 0; if (y > 1) y = 1;

      px[i] = x; py[i] = y;

      // 1.2 px dot — matches original strokeWeight(1.2)
      ctx.rect(x * W, y * H, 1.2, 1.2);
    }
    ctx.fill();
  }

  requestAnimationFrame(draw);

  // ── scroll bucket trigger (same as original) ────────────────────────────
  let lastBucket = -1;
  window.addEventListener('scroll', () => {
    const bucket = Math.floor(scrollY / innerHeight);
    if (bucket !== lastBucket) { lastBucket = bucket; randomise(); }
  }, { passive: true });
</script>
</body>
</html>
